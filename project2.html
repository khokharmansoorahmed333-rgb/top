<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* Normal CSS */

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#eee;
    font-family:Arial, sans-serif;
}

form{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
    width:300px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,
select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

/* Media Query */

@media (max-width:768px){
    form{
        width:90%;
    }
}

@media (max-width:480px){
    body{
        padding:15px;
    }

    form{
        width:100%;
    }

    h2{
        font-size:20px;
    }
}
    </style>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<form>
<h2>Registration Form</h2>

<input type="text" placeholder="Full Name"><br><br>

<input type="email" placeholder="Email"><br><br>

<input type="password" placeholder="Password"><br><br>

<input type="number" placeholder="Age"><br><br>

Gender:
<input type="radio" name="g"> Male
<input type="radio" name="g"> Female
<br><br>

<select>
<option>Karachi</option>
<option>Lahore</option>
<option>Islamabad</option>
</select>

<br><br>

<button>Submit</button>

</form>

</body>
</html>
</body>
</html>
