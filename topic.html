<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Showroom</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Car Showroom</a>
    </div>
</nav>

<!-- Hero Image -->
<div class="container mt-4">
    <img src="https://images.unsplash.com/photo-1538690560694-c770d02e202c?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="img-fluid rounded" alt="Car">
</div>

<!-- Car Cards -->
<div class="container mt-5">
    <div class="row">

        <div class="col-md-4">
            <div class="card">
                <img src="https://plus.unsplash.com/premium_photo-1736166042797-6009deac10b4?q=80&w=1632&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="card-img-top" alt="Car 1">
                <div class="card-body">
                    <h5 class="card-title">Toyota Corolla</h5>
                    <p>Price: Rs. 65,00,000</p>
                    <button class="btn btn-primary">Buy Now</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1600268330186-76564be81357?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="card-img-top" alt="Car 2">
                <div class="card-body">
                    <h5 class="card-title">Honda Civic</h5>
                    <p>Price: Rs. 78,00,000</p>
                    <button class="btn btn-success">Buy Now</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1570829174962-38c53efc5e5a?q=80&w=1163&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" class="card-img-top" alt="Car 3">
                
                <div class="card-body">
                    <h5 class="card-title">Kia Sportage</h5>
                    <p>Price: Rs. 95,00,000</p>
                    <button class="btn btn-danger">Buy Now</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 Car Showroom. All Rights Reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"hight 12px.wrid1px >with 15px</script>

</body>
</html>
